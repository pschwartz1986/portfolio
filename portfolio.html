<!DOCTYPE html>
<html lang="de" data-bs-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio – Bewerbungsmappe</title>
  <meta name="robots" content="noindex, nofollow, noarchive" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" />
  <link rel="stylesheet" href="assets/icons/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="assets/css/custom.css" />
  <style>
    .feature-card {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 2rem;
      height: 100%;
      transition: transform 0.3s ease, border-color 0.3s ease;
    }
    .feature-card:hover {
      transform: translateY(-4px);
      border-color: var(--accent);
      box-shadow: 0 20px 45px rgba(0,0,0,0.45);
    }
    .feature-icon {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      background: var(--accent-glow);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--accent-strong);
      font-size: 1.5rem;
      margin-bottom: 1rem;
    }
    .feature-title {
      font-weight: 700;
      font-size: 1.1rem;
      margin-bottom: 0.4rem;
    }
    .feature-text {
      color: var(--text-muted);
      font-size: 0.9rem;
      line-height: 1.65;
      margin-bottom: 0;
    }
    .page-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 1rem;
    }
    .page-btn {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.8rem 1.2rem;
      text-align: center;
      text-decoration: none;
      color: var(--text-main);
      transition: all 0.3s;
      display: block;
    }
    .page-btn:hover {
      border-color: var(--accent);
      transform: translateY(-3px);
      box-shadow: 0 14px 35px rgba(0,0,0,0.35);
      color: var(--accent-strong);
    }
    .page-icon { font-size: 2rem; color: var(--accent); margin-bottom: 0.6rem; }
    .page-label { font-weight: 700; font-size: 1rem; }
  </style>
</head>
<body>
<div id="login-screen">
    <div class="login-card">
      <div class="lock-icon"><i class="bi bi-lock-fill"></i></div>
      <h2 class="fw-bold mb-1">Exklusiver Zugang</h2>
      <p class="text-muted mb-4">Diese Bewerbungsmappe ist nur für Personalverantwortliche sichtbar.</p>
      <input type="password" id="key-input" class="form-control-dark mb-3" placeholder="Zugangscode eingeben…" autofocus />
      <button id="unlock-btn" class="btn btn-glow"><i class="bi bi-unlock me-2"></i>Freischalten</button>
      <div class="text-danger mt-3" id="error-msg"></div>
    </div>
  </div>
  <div id="portfolio-content" style="display:none;"></div>
  <script src="assets/bootstrap/bootstrap.bundle.min.js"></script>
  <script src="assets/js/crypto.js"></script>
  <script src="assets/js/encrypted-data.js"></script>
  <script src="assets/js/main.js"></script>
</body>
</html>
