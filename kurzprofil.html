<!DOCTYPE html>
<html lang="de" data-bs-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kurzprofil – Bewerbungsmappe</title>
  <meta name="robots" content="noindex, nofollow, noarchive" />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" />
  <link rel="stylesheet" href="assets/icons/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="assets/css/custom.css" />
</head>
<body>
  <div id="login-screen">
    <div class="login-card">
      <div class="lock-icon"><i class="bi bi-lock-fill"></i></div>
      <h2 class="fw-bold mb-1">Exklusiver Zugang</h2>
      <p class="text-muted mb-4">Diese Bewerbungsmappe ist nur für Personalverantwortliche sichtbar.</p>
      <input type="password" id="key-input" class="form-control-dark mb-3" placeholder="Zugangscode eingeben…" autofocus />
      <button id="unlock-btn" class="btn btn-glow"><i class="bi bi-unlock me-2"></i>Freischalten</button>
      <div class="text-danger mt-3" id="error-msg"></div>
    </div>
  </div>
  <div id="portfolio-content" style="display:none;">
    <button id="theme-toggle-bottom" class="theme-toggle-bottom" title="Farbschema wechseln"><i class="bi bi-moon-stars"></i></button>
    <button id="slide-prev" class="slide-arrow slide-arrow-prev" aria-label="Vorherige Seite"><i class="bi bi-chevron-left"></i></button>
    <button id="slide-next" class="slide-arrow slide-arrow-next" aria-label="Nächste Seite"><i class="bi bi-chevron-right"></i></button>
    <section id="skills" class="section">
      <div class="container">
        <div class="text-center">
          <div class="hero-avatar">[S]</div>
          <h1 class="hero-name mb-3">Tech-Stack &amp; Profil</h1>
          <p class="hero-role mb-4">IT- &amp; Medienprofil mit Fokus auf Webentwicklung</p>
          <div class="d-flex gap-3 justify-content-center flex-wrap">
            <a href="anschreiben.html" class="btn btn-glow"><i class="bi bi-envelope me-2"></i>Anschreiben</a>
            <a href="lebenslauf.html" class="btn btn-glow btn-glow-ghost"><i class="bi bi-file-earmark-text me-2"></i>Lebenslauf</a>
          </div>
        </div>
      </div>
    </section>
    <footer class="footer-fixed text-center border-top footer-theme-border">
      <p class="text-muted small mb-0">
        <span class="text-accent">✦</span> Interaktive Bewerbungsmappe – exklusiv zugänglich <span class="text-accent">✦</span>
      </p>
    </footer>
  </div>
  <script src="assets/bootstrap/bootstrap.bundle.min.js"></script>
  <script src="assets/js/main.js"></script>
</body>
</html>
