          - heading "Bewerbung um einen Praktikumsplatz im Rahmen meiner Umschulung zum Fachinformatiker Anwendungsentwicklung" [level=2] [ref=e83]
          - paragraph [ref=e84]: Sehr geehrte Damen und Herren,
          - paragraph [ref=e85]: mein beruflicher Weg war vielseitig und nicht immer gradlinig – genau das hat mich zu dem vielseitigen IT-Allrounder gemacht, der ich heute bin. Mit über 15 Jahren praktischer Erfahrung in den Bereichen Webentwicklung, Linux-Systemen und kreativen Medien möchte ich mein Know-how im Rahmen meiner Umschulung bei der GFN in Essen nun formal fundieren und bei Ihnen in der Praxis anwenden.
          - heading " Was mich auszeichnet – meine technische Bandbreite" [level=3] [ref=e86]:
            - generic [ref=e87]: 
            - text: Was mich auszeichnet – meine technische Bandbreite
          - paragraph [ref=e88]: "Ich habe mir in den letzten Jahren ein breites technologisches Spektrum autodidaktisch erarbeitet:"
          - generic [ref=e89]:
            - list [ref=e91]:
              - listitem [ref=e92]:
                - strong [ref=e93]: "Frontend:"
                - text: HTML5, CSS3, SASS, Bootstrap (v3–v5), Bulma, JavaScript (Vanilla, ES6+)
              - listitem [ref=e94]:
                - strong [ref=e95]: "Backend:"
                - text: PHP (Basics bis erweitert), Python (Flask, individuelle Skripts, Tkinter)
            - list [ref=e97]:
              - listitem [ref=e98]:
                - strong [ref=e99]: "CMS & Datenbanken:"
                - text: WordPress (inkl. Plugin-Entwicklung), diverse Lightweight-CMS, SQL, SQLite3
              - listitem [ref=e100]:
                - strong [ref=e101]: "DevOps & Tools:"
                - text: Docker, npm, pip, Git, GitHub, Linux-Systemadministration
          - paragraph [ref=e102]: Diese Bandbreite ermöglicht es mir, Projekte ganzheitlich zu denken und umzusetzen – von der Konzeption über die Entwicklung bis hin zum Deployment.
          - heading " Meine Referenz – ein lebendiger Beweis meines Könnens" [level=3] [ref=e103]:
            - generic [ref=e104]: 
            - text: Meine Referenz – ein lebendiger Beweis meines Könnens
          - paragraph [ref=e105]:
            - text: Mein aktuellstes Projekt,
            - link "jungelmusik.de" [ref=e106] [cursor=pointer]:
              - /url: https://jungelmusik.de
            - text: ", habe ich vollständig im Alleingang konzipiert, designed und programmiert. Es vereint meine Frontend-Kenntnisse (Bootstrap, SASS, JS) mit Backend-Erfahrung (PHP, SQLite3) und zeigt meine Fähigkeit, professionelle, performante und individuell angepasste Lösungen zu liefern – ohne Vorgaben, ohne Team, einfach aus Leidenschaft."
          - heading " Warum ich zu Ihnen möchte – und warum Sie mich wollen sollten" [level=3] [ref=e107]:
            - generic [ref=e108]: 
            - text: Warum ich zu Ihnen möchte – und warum Sie mich wollen sollten
          - paragraph [ref=e109]: Ich habe mich bewusst für Ihr Unternehmen entschieden, weil ich Ihre Arbeit im Bereich Softwareentwicklung verfolge und mich besonders für anspruchsvolle Projekte begeistere. Die Kombination aus Ihrer innovativen Unternehmenskultur und technologischen Ausrichtung bietet mir die ideale Umgebung, um meine praktischen Fähigkeiten im professionellen Kontext anzuwenden und weiterzuentwickeln.
          - paragraph [ref=e110]: "Die Umschulung bei der GFN in Essen ist für mich der logische Schritt, meine praktische Erfahrung mit einem fundierten, theoretischen Abschluss zu kombinieren und meine Leidenschaft für die Softwareentwicklung zum Beruf zu machen. Ein Praktikum bei Ihnen wäre die perfekte Brücke zwischen Theorie und Praxis – und eine Chance für uns beide: Sie erhalten einen motivierten, erfahrenen und sofort einsatzbereiten Praktikanten, der nicht nur Code schreibt, sondern denkt."
          - heading " Was ich Ihnen biete" [level=3] [ref=e111]:
            - generic [ref=e112]: 
            - text: Was ich Ihnen biete
          - generic [ref=e113]:
            - generic [ref=e114]:
              - generic [ref=e115]:
                - generic [ref=e116]: 
                - generic [ref=e117]:
                  - strong [ref=e118]: "Sofortige Produktivität:"
                  - text: Keine wochenlange Einarbeitung – ich bringe praktische Erfahrung mit
              - generic [ref=e119]:
                - generic [ref=e120]: 
                - generic [ref=e121]:
                  - strong [ref=e122]: "Breites Technologieverständnis:"
                  - text: Ich denke nicht in "meiner" Sprache, sondern in Lösungen
            - generic [ref=e123]:
              - generic [ref=e124]:
                - generic [ref=e125]: 
                - generic [ref=e126]:
                  - strong [ref=e127]: "Eigeninitiative & Verantwortung:"
                  - text: Ich habe bewiesen, dass ich Projekte alleine stemmen kann
              - generic [ref=e128]:
                - generic [ref=e129]: 
                - generic [ref=e130]:
                  - strong [ref=e131]: "Lernbereitschaft & Neugier:"
                  - text: Neue Technologien, KI-Konzepte und Trends sind mein täglich Brot
          - paragraph [ref=e132]: Gerne stehe ich für ein persönliches Gespräch zur Verfügung und freue mich darauf, Sie von meiner Begeisterung für die Softwareentwicklung zu überzeugen. Meine vollständigen Bewerbungsunterlagen sowie mein GitHub-Profil mit weiteren Projekten finden Sie in den Anlagen.
          - generic [ref=e133]:
            - paragraph [ref=e134]: Mit freundlichen Grüßen
            - paragraph [ref=e135]: Patrick Schwartz
