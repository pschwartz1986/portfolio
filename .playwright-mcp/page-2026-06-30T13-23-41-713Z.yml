                - generic [ref=f1e75]:
                  - strong [ref=f1e76]: "Sofortige Produktivität:"
                  - text: Keine wochenlange Einarbeitung – ich bringe praktische Erfahrung mit
              - generic [ref=f1e77]:
                - generic [ref=f1e78]: 
                - generic [ref=f1e79]:
                  - strong [ref=f1e80]: "Breites Technologieverständnis:"
                  - text: Ich denke nicht in "meiner" Sprache, sondern in Lösungen
            - generic [ref=f1e81]:
              - generic [ref=f1e82]:
