          - heading "Bewerbung um einen Praktikumsplatz im Rahmen meiner Umschulung zum Fachinformatiker Anwendungsentwicklung" [level=2] [ref=f1e41]
          - paragraph [ref=f1e42]: Sehr geehrte Damen und Herren,
          - paragraph [ref=f1e43]: mein beruflicher Weg war vielseitig und nicht immer gradlinig – genau das hat mich zu dem vielseitigen IT-Allrounder gemacht, der ich heute bin. Mit über 15 Jahren praktischer Erfahrung in den Bereichen Webentwicklung, Linux-Systemen und kreativen Medien möchte ich mein Know-how im Rahmen meiner Umschulung bei der GFN in Essen nun formal fundieren und bei Ihnen in der Praxis anwenden.
          - heading " Was mich auszeichnet – meine technische Bandbreite" [level=3] [ref=f1e44]:
            - generic [ref=f1e45]: 
            - text: Was mich auszeichnet – meine technische Bandbreite
          - paragraph [ref=f1e46]: "Ich habe mir in den letzten Jahren ein breites technologisches Spektrum autodidaktisch erarbeitet:"
          - generic [ref=f1e47]:
            - list [ref=f1e49]:
              - listitem [ref=f1e50]:
                - strong [ref=f1e51]: "Frontend:"
                - text: HTML5, CSS3, SASS, Bootstrap (v3–v5), Bulma, JavaScript (Vanilla, ES6+)
              - listitem [ref=f1e52]:
                - strong [ref=f1e53]: "Backend:"
                - text: PHP (Basics bis erweitert), Python (Flask, individuelle Skripts, Tkinter)
            - list [ref=f1e55]:
              - listitem [ref=f1e56]:
                - strong [ref=f1e57]: "CMS & Datenbanken:"
                - text: WordPress (inkl. Plugin-Entwicklung), diverse Lightweight-CMS, SQL, SQLite3
              - listitem [ref=f1e58]:
                - strong [ref=f1e59]: "DevOps & Tools:"
                - text: Docker, npm, pip, Git, GitHub, Linux-Systemadministration
          - paragraph [ref=f1e60]: Diese Bandbreite ermöglicht es mir, Projekte ganzheitlich zu denken und umzusetzen – von der Konzeption über die Entwicklung bis hin zum Deployment.
          - heading " Meine Referenz – ein lebendiger Beweis meines Könnens" [level=3] [ref=f1e61]:
            - generic [ref=f1e62]: 
            - text: Meine Referenz – ein lebendiger Beweis meines Könnens
          - paragraph [ref=f1e63]:
            - text: Mein aktuellstes Projekt,
            - link "jungelmusik.de" [ref=f1e64] [cursor=pointer]:
              - /url: https://jungelmusik.de
            - text: ", habe ich vollständig im Alleingang konzipiert, designed und programmiert. Es vereint meine Frontend-Kenntnisse (Bootstrap, SASS, JS) mit Backend-Erfahrung (PHP, SQLite3) und zeigt meine Fähigkeit, professionelle, performante und individuell angepasste Lösungen zu liefern – ohne Vorgaben, ohne Team, einfach aus Leidenschaft."
          - heading " Warum ich zu Ihnen möchte – und warum Sie mich wollen sollten" [level=3] [ref=f1e65]:
            - generic [ref=f1e66]: 
            - text: Warum ich zu Ihnen möchte – und warum Sie mich wollen sollten
          - paragraph [ref=f1e67]: Ich habe mich bewusst für Ihr Unternehmen entschieden, weil ich Ihre Arbeit im Bereich Softwareentwicklung verfolge und mich besonders für anspruchsvolle Projekte begeistere. Die Kombination aus Ihrer innovativen Unternehmenskultur und technologischen Ausrichtung bietet mir die ideale Umgebung, um meine praktischen Fähigkeiten im professionellen Kontext anzuwenden und weiterzuentwickeln.
          - paragraph [ref=f1e68]: "Die Umschulung bei der GFN in Essen ist für mich der logische Schritt, meine praktische Erfahrung mit einem fundierten, theoretischen Abschluss zu kombinieren und meine Leidenschaft für die Softwareentwicklung zum Beruf zu machen. Ein Praktikum bei Ihnen wäre die perfekte Brücke zwischen Theorie und Praxis – und eine Chance für uns beide: Sie erhalten einen motivierten, erfahrenen und sofort einsatzbereiten Praktikanten, der nicht nur Code schreibt, sondern denkt."
          - heading " Was ich Ihnen biete" [level=3] [ref=f1e69]:
            - generic [ref=f1e70]: 
            - text: Was ich Ihnen biete
          - generic [ref=f1e71]:
            - generic [ref=f1e72]:
              - generic [ref=f1e73]:
