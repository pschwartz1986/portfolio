          - paragraph [ref=f1e90]: Gerne stehe ich für ein persönliches Gespräch zur Verfügung und freue mich darauf, Sie von meiner Begeisterung für die Softwareentwicklung zu überzeugen. Meine vollständigen Bewerbungsunterlagen sowie mein GitHub-Profil mit weiteren Projekten finden Sie in den Anlagen.
